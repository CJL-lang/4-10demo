<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#c7c6c6",
                        "inverse-on-surface": "#363022",
                        "on-tertiary-container": "#004d6d",
                        "primary-container": "#ecab13",
                        "on-tertiary-fixed": "#001e2e",
                        "surface-container-lowest": "#130d04",
                        "on-primary-fixed-variant": "#5e4200",
                        "on-background": "#eee1cd",
                        "error": "#ffb4ab",
                        "surface-variant": "#3b3426",
                        "primary": "#ffca68",
                        "on-secondary-fixed-variant": "#464747",
                        "outline": "#9d8f79",
                        "on-secondary-fixed": "#1a1c1c",
                        "on-tertiary-fixed-variant": "#004c6c",
                        "surface-container": "#251f13",
                        "surface-bright": "#40382b",
                        "tertiary-fixed": "#c7e7ff",
                        "on-error": "#690005",
                        "surface-container-highest": "#3b3426",
                        "secondary-fixed": "#e3e2e2",
                        "outline-variant": "#504533",
                        "on-tertiary": "#00344c",
                        "on-surface": "#eee1cd",
                        "tertiary-container": "#4ec1ff",
                        "on-primary": "#422d00",
                        "background": "#181307",
                        "surface-tint": "#febb29",
                        "surface-container-high": "#30291c",
                        "tertiary-fixed-dim": "#83cfff",
                        "surface-container-low": "#211b0f",
                        "primary-fixed-dim": "#febb29",
                        "on-surface-variant": "#d5c4ad",
                        "on-secondary": "#2f3131",
                        "on-primary-container": "#5f4200",
                        "on-primary-fixed": "#271900",
                        "surface-dim": "#181307",
                        "on-error-container": "#ffdad6",
                        "primary-fixed": "#ffdea8",
                        "inverse-primary": "#7c5800",
                        "secondary-container": "#484949",
                        "tertiary": "#a1d9ff",
                        "on-secondary-container": "#b8b8b8",
                        "inverse-surface": "#eee1cd",
                        "surface": "#181307",
                        "error-container": "#93000a",
                        "secondary-fixed-dim": "#c7c6c6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .modal-blur {
            background: rgba(19, 13, 4, 0.95);
            backdrop-filter: blur(12px);
        }
        .star-active {
            font-variation-settings: 'FILL' 1;
            color: #ecab13;
        }
        body {
            background-color: #181307;
        }
    </style>
</head>
<body class="text-on-surface font-body min-h-screen flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="w-full max-w-md bg-surface-container rounded-[2.5rem] overflow-hidden shadow-2xl border border-outline-variant/10">
<div class="p-8 space-y-8">
<!-- Header Section -->
<section>
<div class="flex items-center justify-between mb-8">
<h2 class="text-2xl font-headline font-extrabold tracking-tight text-on-surface">课后互评</h2>
<span class="text-[10px] text-primary-container font-bold px-2 py-1 bg-primary-container/10 rounded uppercase tracking-wider">Evaluation</span>
</div>
<div class="space-y-8">
<!-- Dimension 1 -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<label class="text-sm font-semibold text-on-surface-variant">体能状态</label>
<span class="text-[10px] font-bold text-primary-container uppercase">Excellent</span>
</div>
<div class="flex gap-3">
<span class="material-symbols-outlined star-active">star</span>
<span class="material-symbols-outlined star-active">star</span>
<span class="material-symbols-outlined star-active">star</span>
<span class="material-symbols-outlined star-active">star</span>
<span class="material-symbols-outlined text-outline-variant/40">star</span>
</div>
</div>
<!-- Dimension 2 -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<label class="text-sm font-semibold text-on-surface-variant">心理状态</label>
<span class="text-[10px] font-bold text-primary-container uppercase">Focus</span>
</div>
<div class="flex gap-3">
<span class="material-symbols-outlined star-active">star</span>
<span class="material-symbols-outlined star-active">star</span>
<span class="material-symbols-outlined star-active">star</span>
<span class="material-symbols-outlined star-active">star</span>
<span class="material-symbols-outlined star-active">star</span>
</div>
</div>
<!-- Dimension 3 -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<label class="text-sm font-semibold text-on-surface-variant">技能状态</label>
<span class="text-[10px] font-bold text-on-surface-variant/40 uppercase">Steady</span>
</div>
<div class="flex gap-3">
<span class="material-symbols-outlined star-active">star</span>
<span class="material-symbols-outlined star-active">star</span>
<span class="material-symbols-outlined star-active">star</span>
<span class="material-symbols-outlined text-outline-variant/40">star</span>
<span class="material-symbols-outlined text-outline-variant/40">star</span>
</div>
</div>
</div>
</section>
<!-- Coach Rating Section -->
<section class="pt-4 space-y-6">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
<h3 class="text-sm font-bold text-on-surface">匿名评价教练</h3>
</div>
<div class="flex gap-2">
<span class="material-symbols-outlined star-active text-3xl">star</span>
<span class="material-symbols-outlined star-active text-3xl">star</span>
<span class="material-symbols-outlined star-active text-3xl">star</span>
<span class="material-symbols-outlined star-active text-3xl">star</span>
<span class="material-symbols-outlined text-outline-variant/40 text-3xl">star</span>
</div>
<div class="relative">
<textarea class="w-full bg-surface-container-high/50 border-b border-outline-variant/20 focus:border-primary-container focus:ring-0 text-sm py-4 px-0 placeholder:text-on-surface-variant/30 resize-none h-24" placeholder="教学质量反馈..."></textarea>
</div>
<button class="w-full bg-primary-container hover:bg-primary py-4 rounded-2xl text-on-primary-container font-headline font-black text-sm uppercase tracking-[0.2em] shadow-lg shadow-primary-container/20 transition-all active:scale-[0.98]">
                    提交评价
                </button>
</section>
</div>
<!-- Dismiss Handle for UI completeness -->
<div class="pb-4 flex justify-center">
<div class="w-12 h-1 rounded-full bg-outline-variant/20"></div>
</div>
</div>
</body></html>
